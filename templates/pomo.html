{% extends "base.html" %}

{% block title %}ZEN-ORBIT - Pomodoro{% endblock %}

{% block extra_css %}
    <style>
.timer-container {
    max-width: 800px;
    margin: 100px auto;
    padding: 20px;
}

.timer-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    border: 1px solid rgba(197, 126, 211, 0.3);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.timer-display {
    font-size: 72px;
    font-weight: 700;
    color: #C57ED3;
    text-shadow: 0 0 20px rgba(197, 126, 211, 0.5);
    margin: 20px 0;
    font-family: 'Lato', sans-serif;
}

.timer-controls {
            display: flex;
    gap: 15px;
            justify-content: center;
    margin-top: 20px;
}

.timer-button {
    padding: 12px 30px;
    background: rgba(197, 126, 211, 0.15);
            color: white;
    border: 2px solid rgba(197, 126, 211, 0.3);
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
    font-size: 16px;
}

.timer-button:hover {
    background: rgba(197, 126, 211, 0.25);
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(197, 126, 211, 0.3);
}

.timer-mode {
    color: rgba(255, 255, 255, 0.8);
    font-size: 20px;
    margin-top: 10px;
}

.time-settings {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 20px;
}

.time-setting {
            display: flex;
    flex-direction: column;
            align-items: center;
    gap: 5px;
}

.time-setting label {
    color: rgba(255, 255, 255, 0.8);
    font-size: 14px;
}

.time-setting input {
    width: 60px;
    padding: 5px;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(197, 126, 211, 0.3);
    border-radius: 10px;
    color: white;
    text-align: center;
    font-size: 16px;
}

.time-setting input:focus {
    outline: none;
    border-color: rgba(197, 126, 211, 0.5);
}

.page-title {
    text-align: center;
    padding-top: 80px;
    margin-bottom: 30px;
}

.page-title h1 {
    font-size: 36px;
    color: #C57ED3;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(197, 126, 211, 0.5);
}

.page-title p {
    color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
        }

/* Task Section Styles */
.task-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(197, 126, 211, 0.2);
}

.task-input {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.task-input input {
    flex: 1;
    padding: 8px 15px;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(197, 126, 211, 0.3);
    border-radius: 20px;
    color: white;
    font-size: 14px;
}

.task-input input:focus {
    outline: none;
    border-color: rgba(197, 126, 211, 0.5);
}

.task-list {
            list-style: none;
    padding: 0;
    margin: 0;
}

.task-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 15px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    margin-bottom: 8px;
    transition: all 0.3s ease;
}

.task-item:hover {
    background: rgba(255, 255, 255, 0.1);
}

.task-item.completed {
    opacity: 0.7;
    text-decoration: line-through;
}

.task-item .task-text {
    color: white;
    font-size: 14px;
}

.task-item .task-actions {
            display: flex;
    gap: 8px;
}

.task-item button {
    background: none;
    border: none;
    color: #C57ED3;
    cursor: pointer;
            font-size: 16px;
    padding: 4px;
    transition: all 0.3s ease;
}

.task-item button:hover {
    color: white;
    transform: scale(1.1);
}

.current-task {
    font-size: 16px;
    color: #C57ED3;
    margin: 10px 0;
    text-shadow: 0 0 10px rgba(197, 126, 211, 0.3);
}

/* Progress Bar Styles */
.progress-container {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    margin: 20px 0;
    overflow: hidden;
          position: relative;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #C57ED3, #9B4DA3);
    transition: width 1s linear;
    position: absolute;
    left: 0;
    top: 0;
}

.progress-bar.break {
    background: linear-gradient(90deg, #4D9BA3, #57C5CF);
}

.progress-bar.long-break {
    background: linear-gradient(90deg, #9BA34D, #C5CF57);
}
    </style>
{% endblock %}

{% block content %}
<div class="page-title">
    <h1>Pomodoro Timer</h1>
    <p>Stay focused and productive</p>
</div>

        <div class="timer-container">
    <div class="timer-card">
        <div class="time-settings">
            <div class="time-setting">
                <label>Focus (min)</label>
                <input type="number" id="focusTime" value="25" min="1" max="60">
            </div>
            <div class="time-setting">
                <label>Break (min)</label>
                <input type="number" id="breakTime" value="5" min="1" max="30">
            </div>
            <div class="time-setting">
                <label>Long Break (min)</label>
                <input type="number" id="longBreakTime" value="15" min="1" max="60">
            </div>
        </div>

        <div class="timer-display" id="timer">25:00</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="timer-mode" id="mode">Focus Time</div>
        <div class="current-task" id="currentTask">No task selected</div>
        
        <div class="timer-controls">
            <button class="timer-button" id="start">Start</button>
            <button class="timer-button" id="pause">Pause</button>
            <button class="timer-button" id="reset">Reset</button>
        </div>

        <div class="task-section">
            <div class="task-input">
                <input type="text" id="taskInput" placeholder="Add a task...">
                <button class="timer-button" id="addTask">Add</button>
            </div>
            <ul class="task-list" id="taskList">
                <!-- Tasks will be added here dynamically -->
            </ul>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
    <script>
    let timeLeft = 25 * 60; // 25 minutes in seconds
    let timerId = null;
    let isRunning = false;
    let isBreak = false;
    let isLongBreak = false;
    let completedPomodoros = 0;
    const progressBar = document.getElementById('progressBar');
    let totalTime = 25 * 60; // Initial total time in seconds

    const timerDisplay = document.getElementById('timer');
    const startButton = document.getElementById('start');
    const pauseButton = document.getElementById('pause');
    const resetButton = document.getElementById('reset');
    const modeDisplay = document.getElementById('mode');
    const currentTaskDisplay = document.getElementById('currentTask');
    const focusTimeInput = document.getElementById('focusTime');
    const breakTimeInput = document.getElementById('breakTime');
    const longBreakTimeInput = document.getElementById('longBreakTime');
    const taskInput = document.getElementById('taskInput');
    const addTaskButton = document.getElementById('addTask');
    const taskList = document.getElementById('taskList');

    let tasks = [];

    function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function updateProgress() {
        const progress = ((totalTime - timeLeft) / totalTime) * 100;
        progressBar.style.width = `${progress}%`;
        
        // Update progress bar color based on mode
        progressBar.className = 'progress-bar';
        if (isLongBreak) {
            progressBar.classList.add('long-break');
        } else if (isBreak) {
            progressBar.classList.add('break');
        }
    }

    function startTimer() {
        if (!isRunning) {
            isRunning = true;
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                updateProgress();

                if (timeLeft === 0) {
                    clearInterval(timerId);
                    isRunning = false;
                    playNotification();
                    
                    if (!isBreak) {
                        completedPomodoros++;
                        if (completedPomodoros % 4 === 0) {
                            isLongBreak = true;
                            timeLeft = parseInt(longBreakTimeInput.value) * 60;
                            totalTime = timeLeft;
                            modeDisplay.textContent = 'Long Break';
                        } else {
                            isBreak = true;
                            timeLeft = parseInt(breakTimeInput.value) * 60;
                            totalTime = timeLeft;
                            modeDisplay.textContent = 'Break Time';
                        }
                    } else {
                        isBreak = false;
                        isLongBreak = false;
                        timeLeft = parseInt(focusTimeInput.value) * 60;
                        totalTime = timeLeft;
                        modeDisplay.textContent = 'Focus Time';
                    }
                    
                    updateDisplay();
                    updateProgress();
                }
            }, 1000);
        }
    }

    function pauseTimer() {
        clearInterval(timerId);
        isRunning = false;
        modeDisplay.textContent = 'Paused';
    }

    function resetTimer() {
        clearInterval(timerId);
            isRunning = false;
        isBreak = false;
        isLongBreak = false;
        completedPomodoros = 0;
        timeLeft = parseInt(focusTimeInput.value) * 60;
        totalTime = timeLeft;
        modeDisplay.textContent = 'Focus Time';
        updateDisplay();
        progressBar.style.width = '0%';
    }

    function playNotification() {
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play();
    }

    function addTask() {
        const taskText = taskInput.value.trim();
        if (taskText) {
            const task = {
                id: Date.now(),
                text: taskText,
                completed: false
            };
            tasks.push(task);
            renderTasks();
            taskInput.value = '';
        }
    }

    function toggleTask(taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            task.completed = !task.completed;
            renderTasks();
        }
    }

    function deleteTask(taskId) {
        tasks = tasks.filter(t => t.id !== taskId);
        renderTasks();
    }

    function selectTask(taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            currentTaskDisplay.textContent = task.text;
            // Reset timer to focus time
            timeLeft = parseInt(focusTimeInput.value) * 60;
            updateDisplay();
        }
    }

    function renderTasks() {
        taskList.innerHTML = '';
        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <span class="task-text">${task.text}</span>
                <div class="task-actions">
                    <button onclick="selectTask(${task.id})">▶️</button>
                    <button onclick="toggleTask(${task.id})">${task.completed ? '↩️' : '✓'}</button>
                    <button onclick="deleteTask(${task.id})">🗑️</button>
                </div>
            `;
            taskList.appendChild(li);
        });
    }

    // Event Listeners
    startButton.addEventListener('click', startTimer);
    pauseButton.addEventListener('click', pauseTimer);
    resetButton.addEventListener('click', resetTimer);
    addTaskButton.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    // Initialize display and progress
    updateDisplay();
    progressBar.style.width = '0%';
    </script>
{% endblock %}
